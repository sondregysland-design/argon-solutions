  <text x="481" y="278" font-family="sans-serif" font-size="10" font-weight="600" fill="#1E293B" text-anchor="end">5/5</text>
  <!-- Progress bar -->
  <rect x="295" y="283" width="196" height="7" rx="3" fill="#E2E8F0"/>
  <rect x="295" y="283" width="196" height="7" rx="3" fill="#22C55E"/>
  <!-- Course badges -->
  <rect x="295" y="302" width="44" height="18" rx="4" fill="#DCFCE7"/>
  <text x="317" y="315" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">Gyldig</text>
  <rect x="345" y="302" width="44" height="18" rx="4" fill="#DCFCE7"/>
  <text x="367" y="315" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">Gyldig</text>
  <rect x="395" y="302" width="44" height="18" rx="4" fill="#DCFCE7"/>
  <text x="417" y="315" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">Gyldig</text>
  <!-- Detail link -->
  <text x="400" y="400" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">Detaljer →</text>

  <!-- ====================== -->
  <!-- Employee Card 3: Lena  -->
  <!-- ====================== -->
  <rect x="542" y="152" width="234" height="270" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Avatar -->
  <circle cx="659" cy="194" r="28" fill="#FEE2E2"/>
  <text x="648" y="200" font-family="sans-serif" font-size="16" font-weight="bold" fill="#991B1B">LA</text>
  <!-- Name & title -->
  <text x="659" y="239" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1E293B" text-anchor="middle">Lena Andresen</text>
  <text x="659" y="255" font-family="sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Verneombud</text>
  <!-- Progress label -->
  <text x="554" y="278" font-family="sans-serif" font-size="10" fill="#64748B">Kursgjennomføring</text>
  <text x="740" y="278" font-family="sans-serif" font-size="10" font-weight="600" fill="#1E293B" text-anchor="end">2/5</text>
  <!-- Progress bar -->
  <rect x="554" y="283" width="196" height="7" rx="3" fill="#E2E8F0"/>
  <rect x="554" y="283" width="79" height="7" rx="3" fill="#EF4444"/>
  <!-- Course badges -->
  <rect x="554" y="302" width="44" height="18" rx="4" fill="#DCFCE7"/>
  <text x="576" y="315" font-family="sans-serif" font-size="9" fill="#166534" text-anchor="middle">Gyldig</text>
  <rect x="604" y="302" width="46" height="18" rx="4" fill="#FEE2E2"/>
  <text x="627" y="315" font-family="sans-serif" font-size="9" fill="#991B1B" text-anchor="middle">Utløpt</text>
  <rect x="656" y="302" width="52" height="18" rx="4" fill="#FEF9C3"/>
  <text x="682" y="315" font-family="sans-serif" font-size="9" fill="#854D0E" text-anchor="middle">Utløper</text>
  <!-- Detail link -->
  <text x="659" y="400" font-family="sans-serif" font-size="10" fill="#1E40AF" text-anchor="middle">Detaljer →</text>
